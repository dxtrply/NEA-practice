<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TO DO: Sign-up</title>
    </head>

    <body>
            {% with messages = get_flashed_messages() %}
                {% for message in messages %}
                    <div>{{ message }}</div>
                {% endfor %}
            {% endwith %}
        <h1>TO:DO</h1>
        <h2>Login</h2>
        <form action = "/" method = "post">
            <div>
                <label for= "username"> Username: </label>
                <input type = "text" id = "Username" placeholder="username" name = "username" required minlength="4">
            </div>
            <div>
                <label for= "password"> Password: </label>
                <input type = "password" id = "password" placeholder="password" name = "password" required minlength="8">
            </div>

            <input type = "submit" value = "Login">
        </form>

        <div>
            <p>Not got an account? <a href = "/signup">Click here</a></p>
        </div>


    </body>
    </html>
