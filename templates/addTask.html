{% extends "base.html" %}

{% block title %}
Add Task
{% endblock %}



{% block content %}
<h1>Add New Task</h1>
<form action = "/addTask" method = "post">
    <label for = "description">Task Description</label>
     <input
        type = "text"
        id ="description" 
        name="description" 
        placeholder="e.g. walk dog"
        required
        >
    <input type = "submit" value = "Add Task">
</form>
{% endblock %}
